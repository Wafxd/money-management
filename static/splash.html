<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Dashboard Duit...</title>
    <meta http-equiv="refresh" content="2;url=/dashboard">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        /* Animasi dompet berdetak */
        .emoji {
            font-size: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* Lingkaran loading muter */
        .spinner {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid #2a2a2a;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ffffff, #4CAF50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1s ease-in;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
            animation: fadeIn 2s ease-in;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="spinner"></div>
        <div class="emoji">💼</div>
    </div>
    <div class="title">Dashboard Duit V2</div>
    <div class="subtitle">Menyiapkan brankas rahasiamu...</div>

    <script>
        setTimeout(() => {
            window.location.replace('/dashboard');
        }, 2500);
    </script>
</body>
</html>
