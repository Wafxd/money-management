<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Dashboard Duit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #a0a0a0; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background-color: #121212; padding: 40px; border-radius: 12px; border: 1px solid #2a2a2a; width: 100%; max-width: 400px; box-sizing: border-box; position: relative; z-index: 1; }
        h2 { color: #ffffff; text-align: center; margin-top: 0; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #2a2a2a; background-color: #1a1a1a; color: #ffffff; font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #ffffff; color: #000000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .error { color: #ff6b6b; text-align: center; margin-bottom: 15px; font-size: 0.9rem; }
        .link-bawah { text-align: center; display: block; margin-top: 20px; color: #4CAF50; text-decoration: none; font-size: 0.9rem; }
        .link-bawah:hover { text-decoration: underline; }

        /* --- ANIMASI LOADING FULL SCREEN --- */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
        .loader-overlay.active { display: flex; opacity: 1; }
        .loader-emoji { font-size: 60px; animation: bounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite alternate; margin-bottom: 15px; }
        .loader-text { color: #4CAF50; font-weight: 600; font-size: 1.1rem; letter-spacing: 1px; animation: pulse 1s infinite; }
        
        @keyframes bounce { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-25px) scale(1.1); } }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>
    <!-- OVERLAY LOADING -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-emoji">💼</div>
        <div class="loader-text" id="loaderText">Loading...</div>
    </div>

    <div class="login-card">
        <h2>📝 Daftar Akun</h2>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <!-- Panggil script pas disubmit -->
        <form action="/register" method="POST" onsubmit="tampilkanLoader('Berhasil Register... ✨')">
            <input type="text" name="nama_lengkap" placeholder="Nama Lengkap (Cth: Faris Wafda)" required>
            <input type="text" name="username" placeholder="Username (tanpa spasi)" required>
            <input type="email" name="email" placeholder="Email Aktif (Cth: email@gmail.com)" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Buat Akun Sekarang</button>
        </form>
        <a href="/login" class="link-bawah">Sudah punya akun? Login di sini</a>
    </div>

    <script>
        function tampilkanLoader(pesan) {
            document.getElementById('loaderText').innerText = pesan;
            document.getElementById('loaderOverlay').classList.add('active');
        }
    </script>
</body>
</html>
