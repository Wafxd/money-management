<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Dashboard Duit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <!-- OVERLAY LOADING -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-emoji">✉️</div>
        <div class="loader-text" id="loaderText">Loading...</div>
    </div>

    <div class="login-card">
        <h2>🔑 Lupa Password</h2>
        <p>Masukkan username kamu. Kami akan mengirimkan kode OTP ke email yang terdaftar.</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form action="/lupa_password" method="POST" onsubmit="tampilkanLoader('Mengirim OTP ke Emailmu... ✈️')">
            <input type="text" name="username" placeholder="Masukkan Username" required>
            <button type="submit">Kirim Kode OTP</button>
        </form>
        <a href="/login" class="link-bawah">Kembali ke Login</a>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
