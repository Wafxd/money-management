<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Dashboard Duit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #a0a0a0; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background-color: #121212; padding: 40px; border-radius: 12px; border: 1px solid #2a2a2a; width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { color: #ffffff; text-align: center; margin-top: 0; margin-bottom: 10px; }
        p { text-align: center; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #2a2a2a; background-color: #1a1a1a; color: #ffffff; font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: #ffffff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .error { color: #ff6b6b; text-align: center; margin-bottom: 15px; font-size: 0.9rem; }
        .link-bawah { text-align: center; display: block; margin-top: 20px; color: #a0a0a0; text-decoration: none; font-size: 0.9rem; }
        .link-bawah:hover { color: #ffffff; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔑 Lupa Password</h2>
        <p>Masukkan username kamu. Kami akan mengirimkan kode OTP ke email yang terdaftar.</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/lupa_password" method="POST" onsubmit="this.querySelector('button').innerText = 'Mengirim email...'; this.querySelector('button').style.opacity = '0.7';">
            <input type="text" name="username" placeholder="Masukkan Username" required>
            <button type="submit">Kirim Kode OTP</button>
        </form>
        <a href="/login" class="link-bawah">Kembali ke Login</a>
    </div>
</body>
</html>
