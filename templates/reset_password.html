<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Dashboard Duit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="login-card">
        <h2>✨ Buat Password Baru</h2>
        <p style="color: #4CAF50;">Kode OTP benar! Silakan buat password baru untuk akunmu.</p>
        <form action="/reset_password" method="POST">
            <input type="password" name="new_password" placeholder="Masukkan Password Baru" required>
            <button type="submit">Simpan & Login</button>
        </form>
    </div>
</body>
</html>
