<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi OTP - Dashboard Duit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="login-card">
        <h2>📩 Cek Emailmu!</h2>
        <p>Kami telah mengirimkan 6 digit kode OTP ke email kamu. Masukkan kode tersebut di bawah ini.</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/verify_otp" method="POST">
            <input type="number" name="otp" placeholder="123456" required>
            <button type="submit" class="btn-green">Verifikasi Kode</button>
        </form>
    </div>
</body>
</html>
