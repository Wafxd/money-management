<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi OTP - Dashboard Duit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #a0a0a0; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background-color: #121212; padding: 40px; border-radius: 12px; border: 1px solid #2a2a2a; width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { color: #ffffff; text-align: center; margin-top: 0; margin-bottom: 10px; }
        p { text-align: center; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #2a2a2a; background-color: #1a1a1a; color: #ffffff; font-family: 'Poppins', sans-serif; box-sizing: border-box; text-align: center; font-size: 1.2rem; letter-spacing: 5px; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: #ffffff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .error { color: #ff6b6b; text-align: center; margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>📩 Cek Emailmu!</h2>
        <p>Kami telah mengirimkan 6 digit kode OTP ke email kamu. Masukkan kode tersebut di bawah ini.</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form action="/verify_otp" method="POST">
            <input type="number" name="otp" placeholder="123456" required>
            <button type="submit">Verifikasi Kode</button>
        </form>
    </div>
</body>
</html>
