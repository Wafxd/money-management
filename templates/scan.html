<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Struk AI - Dashboard Duit V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/scan.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">

    <meta property="og:title" content="Dashboard Duit V2 - Money Management">
    <meta property="og:description" content="Catat pemasukan, pengeluaran, transfer antar dompet, dan pantau target tabunganmu dengan asisten AI pintar!">
    
    <meta property="og:image" content="https://money-management-rho-sand.vercel.app/static/img/banner.jpg">
    <meta property="og:url" content="https://money-management-rho-sand.vercel.app/">
    <meta property="og:type" content="website">
</head>
<body>
    <div class="container">
        <h2>📸 Scan Struk Belanja</h2>
        <p>Upload atau foto strukmu biar AI yang catat!</p>

        <!-- Video untuk Kamera -->
        <video id="video" autoplay playsinline style="display:none;"></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="previewImg" style="display:none;">

        <div id="controls">
            <button id="startBtn" class="btn btn-secondary">📷 Buka Kamera</button>
            <button id="snapBtn" class="btn" style="display:none;">📸 Ambil Foto</button>

            <div style="margin: 20px 0; color: #555;">ATAU</div>

            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button id="uploadBtn" class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📁 Upload dari Galeri</button>
        </div>

        <form id="scanForm" action="/scan" method="POST" style="display:none;">
            <input type="hidden" name="foto_base64" id="fotoBase64">
            <button type="submit" class="btn" id="submitBtn">Kirim ke AI 🤖</button>
            <button type="button" class="btn btn-secondary" onclick="location.reload()">Batal</button>
        </form>

        <div id="loading">⏳ Sabar ya, AI lagi mikir keras baca strukmu...</div>
        <a href="/" style="display:block; margin-top: 20px; color: #ff6b6b; text-decoration: none;">Kembali ke Dashboard</a>
    </div>

    <!-- Panggil File JS External -->
    <script src="{{ url_for('static', filename='js/scan.js') }}"></script>
</body>
</html>
